[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:xvfb]
command=/bin/sh -c 'Xvfb ${DISPLAY} -screen 0 ${SCREEN_WIDTH}x${SCREEN_HEIGHT}x${SCREEN_DEPTH} -ac +extension RANDR -nolisten tcp'
priority=10
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr

[program:openbox]
command=/bin/sh -c 'sleep 2 && export DISPLAY=${DISPLAY} && openbox'
priority=20
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr

[program:x11vnc]
command=/bin/sh -c 'sleep 3 && x11vnc -display ${DISPLAY} -forever -shared -rfbauth /home/chrome/.vnc/passwd -rfbport ${VNC_PORT} -ncache 10 -ncache_cr -repeat -xkb -o /tmp/x11vnc.log'
priority=30
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr

[program:novnc]
command=/bin/sh -c 'sleep 4 && /usr/share/novnc/utils/novnc_proxy --listen ${HTTP_PORT} --vnc 127.0.0.1:${VNC_PORT}'
priority=40
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr

[program:chromium]
command=/usr/local/bin/start.sh
priority=50
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
