services:
  chrome:
    build:
      context: .
    container_name: chrome-2g2c
    restart: unless-stopped
    init: true
    shm_size: "256m"
    mem_limit: "1536m"
    cpus: 2
    ports:
      - "6080:6080"
      - "5900:5900"
    environment:
      SCREEN_WIDTH: "1280"
      SCREEN_HEIGHT: "720"
      SCREEN_DEPTH: "24"
      HTTP_PORT: "6080"
      VNC_PORT: "5900"
      TZ: "Asia/Shanghai"
      CHROME_EXTRA_FLAGS: ""
    tmpfs:
      - /tmp:size=256m,exec,nosuid,nodev
      - /dev/shm:size=256m
    volumes:
      - chrome-profile:/home/chrome/profile
      - chrome-cache:/home/chrome/cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:6080/vnc.html >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  chrome-profile:
  chrome-cache:
